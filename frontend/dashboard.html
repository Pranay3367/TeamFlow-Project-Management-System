<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>TeamFlow Dashboard</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">

</head>

<body>

<div class="sidebar">

<h3>🚀 TeamFlow</h3>

<a href="dashboard.html">🏠 Dashboard</a>
<a href="projects.html">📁 Projects</a>
<a href="tasks.html">✅ Tasks</a>
<a href="#" onclick="logout()">🚪 Logout</a>

</div>

<div class="main">

<h2 class="mb-2">Dashboard</h2>

<h5 class="text-secondary mb-4" id="welcomeUser">
Welcome 👋
</h5>

<div class="row g-4">

<div class="col-md-3">

<div class="card shadow border-0">

<div class="card-body text-center">

<h6>Total Projects</h6>

<h2 class="text-primary" id="projectCount">0</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow border-0">

<div class="card-body text-center">

<h6>Total Tasks</h6>

<h2 class="text-success" id="taskCount">0</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow border-0">

<div class="card-body text-center">

<h6>Completed</h6>

<h2 class="text-info" id="completedCount">0</h2>

</div>

</div>

</div>

<div class="col-md-3">

<div class="card shadow border-0">

<div class="card-body text-center">

<h6>Pending</h6>

<h2 class="text-danger" id="pendingCount">0</h2>

</div>

</div>

</div>

</div>

<hr class="my-5">

<div class="row">

<div class="col-lg-6">

<div class="card shadow">

<div class="card-header bg-primary text-white">

Recent Projects

</div>

<div class="card-body p-0">

<table class="table table-hover mb-0">

<thead>

<tr>

<th>ID</th>

<th>Title</th>

<th>Description</th>

</tr>

</thead>

<tbody id="recentProjects">

<tr>

<td colspan="3" class="text-center">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

<div class="col-lg-6">

<div class="card shadow">

<div class="card-header bg-success text-white">

Recent Tasks

</div>

<div class="card-body p-0">

<table class="table table-hover mb-0">

<thead>

<tr>

<th>Task</th>

<th>Status</th>

<th>Priority</th>

<th>Due</th>

</tr>

</thead>

<tbody id="recentTasks">

<tr>

<td colspan="4" class="text-center">

Loading...

</td>

</tr>

</tbody>

</table>

</div>

</div>

</div>

</div>

</div>

<script src="js/api.js"></script>
<script src="js/dashboard.js"></script>

</body>

</html>
